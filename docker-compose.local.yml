# Simplified setup using llama.cpp server for LLM inference
# Replaces Ollama with llama.cpp and Gemma 4

services:
  # llama.cpp server for LLM inference (generative model)
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: ka-llamacpp
    ports:
      - "11434:8080"
    volumes:
      - ./models:/models:ro
    command: >
      -m /models/gemma-4-26B-A4B-it-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      -c 8192
      -ngl 0
      -t 16
    restart: unless-stopped
    networks:
      - ka-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 300s

  # llama.cpp server for embeddings
  llama-cpp-embeddings:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: ka-llamacpp-embeddings
    ports:
      - "11435:8080"
    volumes:
      - ./models:/models:ro
    command: >
      -m /models/embeddinggemma-300M-qat-Q4_0.gguf
      --host 0.0.0.0
      --port 8080
      -c 2048
      --embeddings
      -ngl 0
      -t 8
    restart: unless-stopped
    networks:
      - ka-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # PostgreSQL with pgvector extension
  postgres:
    image: ankane/pgvector:latest
    container_name: ka-postgres
    environment:
      POSTGRES_DB: knowledge_assistant
      POSTGRES_USER: ka_user
      POSTGRES_PASSWORD: ka_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ka_user -d knowledge_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ka-network

  # Knowledge Assistant API Backend
  ka-backend:
    build:
      context: .
      dockerfile: Dockerfile.ka-backend
    container_name: ka-backend
    environment:
      # llama.cpp settings
      LLAMACPP_BASE_URL: http://llama-cpp:8080
      LLAMACPP_EMBED_URL: http://llama-cpp-embeddings:8080
      # Default models
      DEFAULT_MODEL: gemma-4-26B-A4B-it-Q4_K_M
      DEFAULT_EMBED_MODEL: embeddinggemma-300M-qat-Q4_0
      # Database (optional)
      DATABASE_URL: postgresql://ka_user:ka_password@postgres:5432/knowledge_assistant
      # Python settings
      PYTHONUNBUFFERED: 1
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./Knowledge-Assistant:/app/knowledge-assistant:ro
      - ./ka_api_server.py:/app/ka_api_server.py:ro
      - ka_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      llama-cpp:
        condition: service_healthy
      llama-cpp-embeddings:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ka-network

  # Open WebUI Frontend
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ka-open-webui
    environment:
      # llama.cpp API
      OLLAMA_BASE_URL: http://llama-cpp:8080
      # Knowledge Assistant backend as OpenAI-compatible API
      OPENAI_API_BASE_URL: http://ka-backend:8000/v1
      OPENAI_API_KEY: dummy-key-not-required
      # Database
      DATABASE_URL: postgresql://ka_user:ka_password@postgres:5432/knowledge_assistant
      # WebUI settings
      WEBUI_NAME: "Knowledge Assistant"
      WEBUI_URL: http://localhost:3000
      # Enable features
      ENABLE_RAG_WEB_SEARCH: "true"
      ENABLE_IMAGE_GENERATION: "false"
      ENABLE_COMMUNITY_SHARING: "false"
      # Storage
      DATA_DIR: /app/backend/data
      # Disable default authentication for local development
      WEBUI_AUTH: "true"
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy
      llama-cpp:
        condition: service_healthy
      ka-backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - ka-network

volumes:
  postgres_data:
    driver: local
  ka_data:
    driver: local
  open_webui_data:
    driver: local

networks:
  ka-network:
    driver: bridge
