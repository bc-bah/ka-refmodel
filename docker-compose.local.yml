# Simplified setup using your existing local Ollama installation
# This connects to Ollama running on your host machine

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: ankane/pgvector:latest
    container_name: ka-postgres
    environment:
      POSTGRES_DB: knowledge_assistant
      POSTGRES_USER: ka_user
      POSTGRES_PASSWORD: ka_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ka_user -d knowledge_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ka-network

  # Knowledge Assistant API Backend
  ka-backend:
    build:
      context: .
      dockerfile: Dockerfile.ka-backend
    container_name: ka-backend
    environment:
      # Ollama settings (connects to host Ollama)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # Default models
      DEFAULT_MODEL: qwen3:30b
      DEFAULT_EMBED_MODEL: nomic-embed-text-v2-moe
      # Database (optional)
      DATABASE_URL: postgresql://ka_user:ka_password@postgres:5432/knowledge_assistant
      # Python settings
      PYTHONUNBUFFERED: 1
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./Knowledge-Assistant:/app/knowledge-assistant:ro
      - ./ka_api_server.py:/app/ka_api_server.py:ro
      - ka_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ka-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Open WebUI Frontend
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ka-open-webui
    environment:
      # Ollama API (connects to host Ollama)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # Knowledge Assistant backend as OpenAI-compatible API
      OPENAI_API_BASE_URL: http://ka-backend:8000/v1
      OPENAI_API_KEY: dummy-key-not-required
      # Database
      DATABASE_URL: postgresql://ka_user:ka_password@postgres:5432/knowledge_assistant
      # WebUI settings
      WEBUI_NAME: "Knowledge Assistant"
      WEBUI_URL: http://localhost:3000
      # Enable features
      ENABLE_RAG_WEB_SEARCH: "true"
      ENABLE_IMAGE_GENERATION: "false"
      ENABLE_COMMUNITY_SHARING: "false"
      # Storage
      DATA_DIR: /app/backend/data
      # Disable default authentication for local development
      WEBUI_AUTH: "true"
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy
      ka-backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - ka-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
    driver: local
  ka_data:
    driver: local
  open_webui_data:
    driver: local

networks:
  ka-network:
    driver: bridge
